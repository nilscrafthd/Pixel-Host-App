name: Build APK and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.3
          channel: stable
          cache: true

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5

      - name: Fetch dependencies
        run: flutter pub get

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Build release APK
        run: flutter build apk --release

      - name: Prepare Pages content
        run: |
          mkdir -p build/pages
          cp build/app/outputs/flutter-apk/app-release.apk build/pages/Pixel-Host-App.apk
          cat > build/pages/index.html <<'EOF'
          <!doctype html>
          <html lang="de">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Pixel Host App</title>
              <style>
                :root {
                  color-scheme: dark;
                  --bg: #0b1220;
                  --panel: #111b2e;
                  --text: #e5eefc;
                  --muted: #9db0d0;
                  --accent: #4f83ff;
                }
                body {
                  margin: 0;
                  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: radial-gradient(circle at top, #15213a 0%, var(--bg) 60%);
                  color: var(--text);
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  padding: 24px;
                }
                .card {
                  width: min(640px, 100%);
                  background: rgba(17, 27, 46, 0.92);
                  border: 1px solid rgba(157, 176, 208, 0.16);
                  border-radius: 24px;
                  padding: 32px;
                  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
                }
                h1 { margin: 0 0 12px; font-size: clamp(2rem, 5vw, 3rem); }
                p { line-height: 1.6; color: var(--muted); }
                a.button {
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                  margin-top: 18px;
                  padding: 14px 20px;
                  border-radius: 14px;
                  background: var(--accent);
                  color: white;
                  text-decoration: none;
                  font-weight: 700;
                }
                .meta { margin-top: 18px; font-size: 0.95rem; color: var(--muted); }
              </style>
            </head>
            <body>
              <main class="card">
                <h1>Pixel Host App</h1>
                <p>Flutter-App zum Einloggen in Pterodactyl und Verwalten deiner Server.</p>
                <a class="button" href="Pixel-Host-App.apk">APK herunterladen</a>
                <div class="meta">Dieses Repository wird bei jedem Push auf <strong>main</strong> gebaut und auf GitHub Pages veröffentlicht.</div>
              </main>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4